<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.container{
  text-align:center;
  background:rgba(255,255,255,0.15);
  padding:20px;
  border-radius:20px;
  backdrop-filter:blur(8px);
  transition:0.5s;
  z-index:10;
  position:relative;
}

.container.blur{
  filter:blur(4px) brightness(0.8);
}

.text{
  color:white;
  font-size:22px;
  margin-bottom:20px;
}

button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.yes{background:#ff4d6d;color:white;}
.no{background:#eee;}

.photo-container{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:20px;
}

.photo{
  width:140px;
  height:180px;
  object-fit:cover;
  border-radius:15px;
  opacity:0;
  transform:scale(0.8);
  transition: all 0.8s ease;
}

.photo.show{
  opacity:1;
  transform:scale(1);
}

.photo:hover{
  transform:scale(1.1);
}

#finalSection{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  display:none;
  pointer-events:none; /* prevents blocking clicks */
  z-index:5;
}

#finalText{
  color:white;
  font-size:20px;
  margin-top:15px;
  opacity:0;
  transition:1s;
}

#finalText.show{
  opacity:1;
}



.character{
  width:100px;
  margin-bottom:10px;
  animation:float 2s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0);} 
  50%{transform:translateY(-10px);} 
  100%{transform:translateY(0);} 
}

</style>
</head>

<body>

<audio id="music" loop>
  <source src="tu-chahiye.mp3" type="audio/mpeg">
</audio>

<div class="container" id="mainBox">

<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" id="character" class="character">

<div class="text" id="text">
Do you love me? 🥺<br>Is there any chance you might say yes?
</div>

<button class="yes" onclick="yesClick()">Yes ❤️</button>
<button class="no" id="noBtn" onclick="noClick()">No 😢</button>

</div>

<!-- FINAL SECTION -->
<div id="finalSection">
  <div class="photo-container">
    <img src="our-photo.jpg" id="photo" class="photo">
    <img src="our-photo2.jpg" id="photo2" class="photo">
    <img src="our-photo3.jpg" id="photo3" class="photo">
  </div>
  <div id="finalText">Seeee how good we look together!! ❤️❤️</div>
</div>

<script>
let step=0;
const music=document.getElementById("music");

// play music on first click
document.body.addEventListener("click",()=>{
  music.volume=0.5;
  music.play();
},{once:true});

function noClick(){
  const character=document.getElementById("character");
  step++;
  const text=document.getElementById("text");

  if(step==1){
    character.src="https://media.giphy.com/media/ROF8OQvDmxytW/giphy.gif";
    text.innerHTML="Soch lo na ek baar aur 🥺";
  }
  else if(step==2){
    character.src="https://media.giphy.com/media/d2lcHJTG5Tscg/giphy.gif";
    text.innerHTML="Areee yaarrr aisa kya karti ho... pyaar karta hu na 🥺";
  }
}

function yesClick(){
  document.getElementById("character").src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif";
  document.getElementById("mainBox").classList.add("blur");
  document.getElementById("text").innerHTML="Heheheehe ik you love me you beautiful sweet dumbass 😘❤️";

  setTimeout(()=>{
    document.getElementById("finalSection").style.display="block";

    const p1=document.getElementById("photo");
    const p2=document.getElementById("photo2");
    const p3=document.getElementById("photo3");

    setTimeout(()=>p1.classList.add("show"),200);
    setTimeout(()=>p2.classList.add("show"),700);
    setTimeout(()=>p3.classList.add("show"),1200);

    // slow zoom sync with music
    setInterval(()=>{
      p1.style.transform="scale(1.05)";
      p2.style.transform="scale(1.05)";
      p3.style.transform="scale(1.05)";
      setTimeout(()=>{
        p1.style.transform="scale(1)";
        p2.style.transform="scale(1)";
        p3.style.transform="scale(1)";
      },1500);
    },3000);

    setTimeout(()=>{
      document.getElementById("finalText").classList.add("show");
    },1500);

  },5000);
}

const noBtn=document.getElementById("noBtn");

document.addEventListener("mousemove",()=>{
  if(step>=2){
    noBtn.style.position="absolute";
    noBtn.style.left=Math.random()*window.innerWidth+"px";
    noBtn.style.top=Math.random()*window.innerHeight+"px";
  }
});

</script>

</body>
</html>
